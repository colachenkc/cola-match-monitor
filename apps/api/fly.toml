# fly.toml app configuration file generated for match-monitor-api on 2026-04-25T00:20:38+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'match-monitor-api'
primary_region = 'nrt'

[build]

[env]
  COOKIE_SAMESITE = 'none'
  COOKIE_SECURE = 'true'
  DATABASE_URL = 'sqlite:////data/match_monitor.db'
  UPLOAD_ROOT = '/data/uploads'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
